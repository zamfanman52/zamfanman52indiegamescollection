name: Deploy Website Python

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write      # Tambahkan izin untuk GitHub Pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Python Script
      run: python script.py

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v6 # Upgrade ke v6 (versi terbaru & lebih stabil)
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public            # Ubah ke ./public agar hanya web-nya saja yang di-deploy
        publish_branch: gh-pages
