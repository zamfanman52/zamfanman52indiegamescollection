name: Deploy Website Python

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write      # Mengizinkan GitHub Actions untuk menulis ke GitHub Pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Python Script
      run: python script.py

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4 # Diubah ke v4 (versi stabil terbaru yang valid)
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public            # Mengambil isi folder public hasil dari script.py
        publish_branch: gh-pages
